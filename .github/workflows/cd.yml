# ═════════════════════════════════════════════════════════════════════
# HerWell — Continuous Deployment (CD)
# ═════════════════════════════════════════════════════════════════════
# On every push to main, builds & pushes Docker images to Amazon ECR,
# then SSHes into the EC2 instance to pull and redeploy.
#
# Permissions note:
#   id-token: write  — reserved for future OIDC authentication.
#   contents: read   — needed for actions/checkout.
#
# For this project we use AWS access key auth via GitHub Secrets,
# which is the simpler path appropriate for a learning project.
# ═════════════════════════════════════════════════════════════════════

name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_BACKEND_REPO: ${{ secrets.ECR_BACKEND_REPO }}
  ECR_FRONTEND_REPO: ${{ secrets.ECR_FRONTEND_REPO }}
  VITE_API_URL: ${{ vars.VITE_API_URL }}

jobs:

  build-and-deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      # ── Checkout app source code ─────────────────────────────────
      - name: Checkout HerWellness app code
        uses: actions/checkout@v4
        with:
          repository: GitHer-Muna/HerWellness
          path: herwellness-app

      - name: Merge app code into build context
        run: |
          # HerWellness backend/ and frontend/ get copied into our build dirs.
          # Our Dockerfiles and .dockerignore are preserved because
          # the HerWellness repo doesn't have them.
          cp -r herwellness-app/backend/* ./backend/
          cp -r herwellness-app/frontend/* ./frontend/

      # ── Install prom-client and wire up metrics ───────────────────
      - name: Wire up Prometheus metrics in server.js
        working-directory: ./backend
        run: |
          # Install prom-client so the metrics module works
          npm install --save prom-client

          # Patch server.js to import and use the metrics module
          node bin/wire-metrics.js

          # Verify the patching succeeded
          grep -q "http_requests_total" src/server.js || { echo '✗ metrics wiring failed'; exit 1; }
          grep -q "app.get('/metrics'" src/server.js || { echo '✗ /metrics route not found'; exit 1; }
          echo '✓ Metrics wiring verified'

      # ── AWS credentials ──────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── ECR login ────────────────────────────────────────────────
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push backend ─────────────────────────────────────
      - name: Build & push backend image
        id: build-backend
        env:
          BACKEND_TAG: ${{ env.ECR_REGISTRY }}/${{ env.ECR_BACKEND_REPO }}
        run: |
          docker build -t $BACKEND_TAG:${{ github.sha }} -t $BACKEND_TAG:latest ./backend
          docker push $BACKEND_TAG:${{ github.sha }}
          docker push $BACKEND_TAG:latest

      # ── Build & push frontend ────────────────────────────────────
      - name: Build & push frontend image
        id: build-frontend
        env:
          FRONTEND_TAG: ${{ env.ECR_REGISTRY }}/${{ env.ECR_FRONTEND_REPO }}
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ env.VITE_API_URL }} \
            -t $FRONTEND_TAG:${{ github.sha }} \
            -t $FRONTEND_TAG:latest \
            ./frontend
          docker push $FRONTEND_TAG:${{ github.sha }}
          docker push $FRONTEND_TAG:latest

      # ── Deploy on EC2 ────────────────────────────────────────────
      - name: SSH into EC2 and redeploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: 'AWS_REGION,ECR_REGISTRY,ECR_BACKEND_REPO,ECR_FRONTEND_REPO,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN'
          script: |
            set -e
            cd ~/herwell
            git pull origin main

            # Ensure AWS CLI is available (Amazon Linux 2023)
            which aws >/dev/null 2>&1 || sudo dnf install -y aws-cli

            # Check that .env file exists with required variables
            if [ ! -f .env ]; then
              echo '✗ .env file not found! Create it from .env.example:'
              echo '  cp .env.example .env && nano .env'
              exit 1
            fi
            for VAR in JWT_SECRET DB_PASSWORD POSTGRES_PASSWORD; do
              VAL=$(grep "^${VAR}=" .env | cut -d= -f2)
              if [ -z "$VAL" ] || echo "$VAL" | grep -qi "change\|replace\|changeme"; then
                echo "✗ ${VAR} is not set or still has placeholder value in .env"
                echo "  Generate one: openssl rand -hex 64"
                exit 1
              fi
            done
            echo "✓ .env file looks valid"

            # Log in to ECR so we can pull the private images
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$ECR_REGISTRY" >/dev/null

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for backend to become healthy (up to 2 min)
            # Uses Docker's built-in HEALTHCHECK (which pings localhost:3001/health internally)
            echo "Waiting for backend to start..."
            BACKEND_OK=false
            for i in $(seq 1 24); do
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' herwell-backend-1 2>/dev/null || echo "starting")
              if [ "$HEALTH" = "healthy" ]; then
                echo "✓ Backend healthy after $((i * 5)) seconds"
                BACKEND_OK=true
                break
              fi
              echo "Attempt $i: health=$HEALTH"
              sleep 5
            done

            if [ "$BACKEND_OK" != "true" ]; then
              echo "✗ Backend failed to start. Showing logs:"
              docker compose -f docker-compose.prod.yml logs backend --tail=30
              exit 1
            fi

            docker image prune -af --filter "until=72h"

      # ── Check registration endpoint ──────────────────────────────
      - name: Check registration endpoint works
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          # Try registering a test user — expect either 201 (created) or
          # 400/409 (duplicate). 500 is a failure.
          REG_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST http://$EC2_HOST/api/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"email":"test@cd-check.com","password":"Test1234!","firstName":"CD","lastName":"Check","dateOfBirth":"2000-01-01"}' \
            2>/dev/null || echo "000")
          if [ "$REG_STATUS" = "201" ] || [ "$REG_STATUS" = "400" ] || [ "$REG_STATUS" = "409" ]; then
            echo "✓ Registration endpoint responded: $REG_STATUS"
          else
            echo "⚠ Registration returned $REG_STATUS — may indicate an issue"
            # Show backend logs to help diagnose
            echo "--- Backend logs ---"
            ssh -o StrictHostKeyChecking=no -i /dev/null ec2-user@$EC2_HOST "docker compose -f ~/herwell/docker-compose.prod.yml logs backend --tail=20" 2>/dev/null || true
          fi

      # ── Smoke test after deploy ──────────────────────────────────
      - name: Smoke test deployed API
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://$EC2_HOST/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Health check returned 200 after $((i * 5)) seconds"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "✗ Health check failed after 60 seconds"
          exit 1
