# ═════════════════════════════════════════════════════════════════════
# HerWell — Continuous Deployment (CD)
# ═════════════════════════════════════════════════════════════════════
# On every push to main, builds & pushes Docker images to Amazon ECR,
# then SSHes into the EC2 instance to pull and redeploy.
#
# Permissions note:
#   id-token: write  — reserved for future OIDC authentication.
#   contents: read   — needed for actions/checkout.
#
# For this project we use AWS access key auth via GitHub Secrets,
# which is the simpler path appropriate for a learning project.
# ═════════════════════════════════════════════════════════════════════

name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_BACKEND_REPO: ${{ secrets.ECR_BACKEND_REPO }}
  ECR_FRONTEND_REPO: ${{ secrets.ECR_FRONTEND_REPO }}
  VITE_API_URL: ${{ vars.VITE_API_URL }}

jobs:

  build-and-deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      # ── Checkout app source code ─────────────────────────────────
      - name: Checkout HerWellness app code
        uses: actions/checkout@v4
        with:
          repository: GitHer-Muna/HerWellness
          path: herwellness-app

      - name: Merge app code into build context
        run: |
          # HerWellness backend/ and frontend/ get copied into our build dirs.
          # Our Dockerfiles and .dockerignore are preserved because
          # the HerWellness repo doesn't have them.
          cp -r herwellness-app/backend/* ./backend/
          cp -r herwellness-app/frontend/* ./frontend/

      # ── Install prom-client and wire up metrics ───────────────────
      - name: Wire up Prometheus metrics in server.js
        working-directory: ./backend
        run: |
          # Install prom-client so the metrics module works
          npm install --save prom-client

          # Patch server.js to import and use the metrics module
          node bin/wire-metrics.js

          # Verify the patching succeeded
          grep -q "http_requests_total" src/server.js || { echo 'Metrics wiring failed'; exit 1; }
          grep -q "app.get(.'/metrics." src/server.js || { echo 'Metrics route not found'; exit 1; }
          echo 'Metrics wiring verified'

      # ── AWS credentials ──────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── ECR login ────────────────────────────────────────────────
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push backend ─────────────────────────────────────
      - name: Build & push backend image
        id: build-backend
        env:
          BACKEND_TAG: ${{ env.ECR_REGISTRY }}/${{ env.ECR_BACKEND_REPO }}
        run: |
          docker build -t $BACKEND_TAG:${{ github.sha }} -t $BACKEND_TAG:latest ./backend
          docker push $BACKEND_TAG:${{ github.sha }}
          docker push $BACKEND_TAG:latest

      # ── Build & push frontend ────────────────────────────────────
      - name: Build & push frontend image
        id: build-frontend
        env:
          FRONTEND_TAG: ${{ env.ECR_REGISTRY }}/${{ env.ECR_FRONTEND_REPO }}
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ env.VITE_API_URL }} \
            -t $FRONTEND_TAG:${{ github.sha }} \
            -t $FRONTEND_TAG:latest \
            ./frontend
          docker push $FRONTEND_TAG:${{ github.sha }}
          docker push $FRONTEND_TAG:latest

      # ── Deploy on EC2 ────────────────────────────────────────────
      - name: SSH into EC2 and redeploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: 'AWS_REGION,ECR_REGISTRY,ECR_BACKEND_REPO,ECR_FRONTEND_REPO,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN'
          script: |
            set -e
            cd ~/herwell
            git pull origin main

            # Ensure AWS CLI is available
            which aws >/dev/null 2>&1 || sudo dnf install -y aws-cli

            # Ensure .env exists
            if [ ! -f .env ]; then
              echo "Creating .env from .env.example..."
              cp .env.example .env
            fi

            # Auto-generate JWT_SECRET if missing or placeholder (safe - stateless)
            JWT=$(grep "^JWT_SECRET=" .env | cut -d= -f2-)
            if [ -z "$JWT" ] || echo "$JWT" | grep -qi "change\|replace\|changeme"; then
              JWT=$(openssl rand -hex 64)
              sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${JWT}|" .env
              echo "Generated JWT_SECRET"
            fi

            # Check DB passwords - only warn, don't regenerate (would break running DB)
            DB_PW=$(grep "^DB_PASSWORD=" .env | cut -d= -f2-)
            PG_PW=$(grep "^POSTGRES_PASSWORD=" .env | cut -d= -f2-)
            if [ -z "$DB_PW" ] || echo "$DB_PW" | grep -qi "change\|replace\|changeme"; then
              echo "Warning: DB_PASSWORD still has placeholder value in .env"
              echo "  Keeping it as-is to avoid breaking the database connection."
            fi

            # Update CORS_ORIGIN to current EC2 IP
            EC2_IP=$(curl -s http://checkip.amazonaws.com 2>/dev/null | tr -d '\n')
            if [ -n "$EC2_IP" ]; then
              if grep -q "^CORS_ORIGIN=" .env; then
                sed -i "s|^CORS_ORIGIN=.*|CORS_ORIGIN=http://${EC2_IP}|" .env
              else
                echo "CORS_ORIGIN=http://${EC2_IP}" >> .env
              fi
              echo "Updated CORS_ORIGIN to http://${EC2_IP}"
            fi

            # Ensure DB_HOST points to the Docker service name
            if grep -q "^DB_HOST=" .env; then
              sed -i "s|^DB_HOST=.*|DB_HOST=db|" .env
            else
              echo "DB_HOST=db" >> .env
            fi

            echo "Env config done"

            # Log in to ECR
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$ECR_REGISTRY" >/dev/null

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for backend to become healthy (up to 2 min)
            echo "Waiting for backend to start..."
            BACKEND_OK=false
            for i in $(seq 1 24); do
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' herwell-backend-1 2>/dev/null || echo "starting")
              if [ "$HEALTH" = "healthy" ]; then
                echo "Backend healthy after $((i * 5)) seconds"
                BACKEND_OK=true
                break
              fi
              echo "Attempt $i: health=$HEALTH"
              sleep 5
            done

            if [ "$BACKEND_OK" != "true" ]; then
              echo "Backend failed to start. Showing logs:"
              docker compose -f docker-compose.prod.yml logs backend --tail=30
              exit 1
            fi

            docker image prune -af --filter "until=72h"

      # ── Smoke test after deploy ──────────────────────────────────
      - name: Smoke test deployed API
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://$EC2_HOST/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check returned 200 after $((i * 5)) seconds"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 60 seconds"
          exit 1
