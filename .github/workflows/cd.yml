# ═════════════════════════════════════════════════════════════════════
# HerWell — Continuous Deployment (CD)
# ═════════════════════════════════════════════════════════════════════
# On every push to main, builds & pushes Docker images to Amazon ECR,
# then SSHes into the EC2 instance to pull and redeploy.
#
# Permissions note:
#   id-token: write  — reserved for future OIDC authentication.
#   contents: read   — needed for actions/checkout.
#
# For this project we use AWS access key auth via GitHub Secrets,
# which is the simpler path appropriate for a learning project.
# ═════════════════════════════════════════════════════════════════════

name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_BACKEND_REPO: ${{ secrets.ECR_BACKEND_REPO }}
  ECR_FRONTEND_REPO: ${{ secrets.ECR_FRONTEND_REPO }}
  VITE_API_URL: ${{ vars.VITE_API_URL }}

jobs:

  build-and-deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      # ── Checkout app source code ─────────────────────────────────
      - name: Checkout HerWellness app code
        uses: actions/checkout@v4
        with:
          repository: GitHer-Muna/HerWellness
          path: herwellness-app

      - name: Merge app code into build context
        run: |
          # HerWellness backend/ and frontend/ get copied into our build dirs.
          # Our Dockerfiles and .dockerignore are preserved because
          # the HerWellness repo doesn't have them.
          cp -r herwellness-app/backend/* ./backend/
          cp -r herwellness-app/frontend/* ./frontend/

      # ── Install prom-client and wire up metrics ───────────────────
      - name: Wire up Prometheus metrics in server.js
        working-directory: ./backend
        run: |
          # Install prom-client so the metrics module works
          npm install --save prom-client

          # Patch server.js to import and use the metrics module
          node bin/wire-metrics.js

          # Verify the patching succeeded
          grep -q "http_requests_total" src/server.js || { echo 'Metrics wiring failed'; exit 1; }
          grep -q "'/metrics'" src/server.js || { echo 'Metrics route not found'; exit 1; }
          echo 'Metrics wiring verified'

      # ── Patch migrate.js error handling & check scripts ────────────
      - name: Patch migration error handling and check scripts
        working-directory: ./backend
        run: |
          # Patch migrate.js: the .catch(() => process.exit(1)) silently swallows
          # connection errors. Add error logging before the exit.
          if grep -q 'migrate().catch(() => process.exit(1))' src/db/migrate.js; then
            sed -i 's/migrate().catch(() => process.exit(1))/migrate().catch(err => { console.error("MIGRATION FAILED:", err.message); process.exit(1); })/' src/db/migrate.js
            echo "Patched migrate.js error handling"
          fi
          if grep -q 'migrate().catch(() => process.exit(1))' src/db/migrate_wellness.js; then
            sed -i 's/migrate().catch(() => process.exit(1))/migrate().catch(err => { console.error("WELLNESS MIGRATION FAILED:", err.message); process.exit(1); })/' src/db/migrate_wellness.js
            echo "Patched migrate_wellness.js error handling"
          fi

          echo "Checking package.json scripts..."
          node -e "
            const p = require('./package.json');
            const scripts = Object.keys(p.scripts || {});
            console.log('Available scripts: ' + (scripts.length ? scripts.join(', ') : 'none'));
            const migrationScripts = scripts.filter(s => /migrate|db:|schema|setup|init|sync|seed/.test(s));
            if (migrationScripts.length) {
              console.log('Migration-related: ' + migrationScripts.join(', '));
              require('fs').writeFileSync('migration-scripts.txt', migrationScripts.join('\n'));
            } else {
              console.log('No migration scripts found');
            }
          "

      # ── AWS credentials ──────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── ECR login ────────────────────────────────────────────────
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push backend ─────────────────────────────────────
      - name: Build & push backend image
        id: build-backend
        env:
          BACKEND_TAG: ${{ env.ECR_REGISTRY }}/${{ env.ECR_BACKEND_REPO }}
        run: |
          docker build -t $BACKEND_TAG:${{ github.sha }} -t $BACKEND_TAG:latest ./backend
          docker push $BACKEND_TAG:${{ github.sha }}
          docker push $BACKEND_TAG:latest

      # ── Build & push frontend ────────────────────────────────────
      - name: Build & push frontend image
        id: build-frontend
        env:
          FRONTEND_TAG: ${{ env.ECR_REGISTRY }}/${{ env.ECR_FRONTEND_REPO }}
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ env.VITE_API_URL }} \
            -t $FRONTEND_TAG:${{ github.sha }} \
            -t $FRONTEND_TAG:latest \
            ./frontend
          docker push $FRONTEND_TAG:${{ github.sha }}
          docker push $FRONTEND_TAG:latest

      # ── Deploy on EC2 ────────────────────────────────────────────
      - name: SSH into EC2 and redeploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: 'AWS_REGION,ECR_REGISTRY,ECR_BACKEND_REPO,ECR_FRONTEND_REPO,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN'
          script: |
            set -e
            cd ~/herwell
            git pull origin main

            # Ensure AWS CLI is available
            which aws >/dev/null 2>&1 || sudo dnf install -y aws-cli

            # Ensure .env exists
            if [ ! -f .env ]; then
              echo "Creating .env from .env.example..."
              cp .env.example .env
            fi

            # Auto-generate JWT_SECRET if missing or placeholder (safe - stateless)
            JWT=$(grep "^JWT_SECRET=" .env | cut -d= -f2-)
            if [ -z "$JWT" ] || echo "$JWT" | grep -qi "change\|replace\|changeme"; then
              JWT=$(openssl rand -hex 64)
              sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${JWT}|" .env
              echo "Generated JWT_SECRET"
            fi

            # Fix placeholder DB_PASSWORD by generating a new one AND
            # recreating the Postgres volume so password stays in sync
            DB_PW=$(grep "^DB_PASSWORD=" .env | cut -d= -f2-)
            PG_PW=$(grep "^POSTGRES_PASSWORD=" .env | cut -d= -f2-)
            NEEDS_PW_RESET=false
            if [ -z "$DB_PW" ] || echo "$DB_PW" | grep -qi "change\|replace\|changeme"; then
              echo "DB_PASSWORD is placeholder - generating new password"
              NEW_PW=$(openssl rand -hex 32)
              sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${NEW_PW}|" .env
              sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${NEW_PW}|" .env
              NEEDS_PW_RESET=true
            fi
            # Also check POSTGRES_PASSWORD independently
            if [ "$NEEDS_PW_RESET" != "true" ] && ([ -z "$PG_PW" ] || echo "$PG_PW" | grep -qi "change\|replace\|changeme"); then
              echo "POSTGRES_PASSWORD is placeholder - generating new password"
              NEW_PW=$(openssl rand -hex 32)
              sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${NEW_PW}|" .env
              sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${NEW_PW}|" .env
              NEEDS_PW_RESET=true
            fi

            # Update CORS_ORIGIN to current EC2 IP
            EC2_IP=$(curl -s http://checkip.amazonaws.com 2>/dev/null | tr -d '\n')
            if [ -n "$EC2_IP" ]; then
              if grep -q "^CORS_ORIGIN=" .env; then
                sed -i "s|^CORS_ORIGIN=.*|CORS_ORIGIN=http://${EC2_IP}|" .env
              else
                echo "CORS_ORIGIN=http://${EC2_IP}" >> .env
              fi
              echo "Updated CORS_ORIGIN to http://${EC2_IP}"
            fi

            # Ensure DB_HOST points to the Docker service name
            if grep -q "^DB_HOST=" .env; then
              sed -i "s|^DB_HOST=.*|DB_HOST=db|" .env
            else
              echo "DB_HOST=db" >> .env
            fi

            echo "Env config done"

            # Log in to ECR
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$ECR_REGISTRY" >/dev/null

            docker compose -f docker-compose.prod.yml pull

            # If password was regenerated, blow away the old Postgres volume
            # so it re-initializes with the new password.
            # Uses 'down -v' to remove the project-prefixed volume correctly.
            if [ "$NEEDS_PW_RESET" = "true" ]; then
              echo "Password changed - recreating Postgres volume..."
              docker compose -f docker-compose.prod.yml down -v
            fi

            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Wait for backend to become healthy (up to 2 min)
            echo "Waiting for backend to start..."
            BACKEND_OK=false
            for i in $(seq 1 24); do
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' herwell-backend-1 2>/dev/null || echo "starting")
              if [ "$HEALTH" = "healthy" ]; then
                echo "Backend healthy after $((i * 5)) seconds"
                BACKEND_OK=true
                break
              fi
              echo "Attempt $i: health=$HEALTH"
              sleep 5
            done

            if [ "$BACKEND_OK" != "true" ]; then
              echo "Backend failed to start. Showing logs:"
              docker compose -f docker-compose.prod.yml logs backend --tail=30
              exit 1
            fi

            docker image prune -af --filter "until=72h"

            # ── Database connectivity test ────────────────────────────────
            echo "=== Testing database connectivity ==="
            # Copy the diagnostic script into the container and run it
            docker cp ~/herwell/backend/bin/db-connectivity-test.js herwell-backend-1:/app/bin/db-connectivity-test.js 2>/dev/null || true
            docker compose -f docker-compose.prod.yml exec -T backend node \
              -e '
                const {Pool} = require("pg");
                const p = new Pool({
                  host:     process.env.DB_HOST     || "localhost",
                  port:     parseInt(process.env.DB_PORT, 10) || 5432,
                  user:     process.env.DB_USER     || "herwell",
                  password: process.env.DB_PASSWORD || "",
                  database: process.env.DB_NAME     || "herwell",
                  connectionTimeoutMillis: 10000,
                });
                p.connect().then(c => { c.release(); p.end(); console.log("DB OK"); process.exit(0); }).catch(e => { console.error("DB FAIL:", e.message); p.end(); process.exit(1); });
              ' 2>&1 && echo "Database connectivity OK" || {
              echo "Database connection FAILED!"
              echo "=== db container logs ==="
              docker compose -f docker-compose.prod.yml logs db --tail=30
              echo "=== backend container env ==="
              docker compose -f docker-compose.prod.yml exec -T backend node -e "console.log('DB_HOST=' + (process.env.DB_HOST||'not-set') + ' DB_PORT=' + (process.env.DB_PORT||'not-set') + ' DB_USER=' + (process.env.DB_USER||'not-set') + ' DB_NAME=' + (process.env.DB_NAME||'not-set') + ' PW_SET=' + (process.env.DB_PASSWORD?'yes':'no'))"
              exit 1
            }

            # ── Database migration ────────────────────────────────────────
            echo "=== Running database migrations ==="
            docker compose -f docker-compose.prod.yml exec -T backend npm run migrate:all 2>&1 || \
              docker compose -f docker-compose.prod.yml exec -T backend npm run migrate 2>&1
            MIGRATE_EXIT=$?
            if [ "$MIGRATE_EXIT" -ne 0 ]; then
              echo "Migration failed with exit code $MIGRATE_EXIT"
              echo "=== Backend logs ==="
              docker compose -f docker-compose.prod.yml logs backend --tail=30
              echo "=== db container logs ==="
              docker compose -f docker-compose.prod.yml logs db --tail=20
              exit 1
            fi
            echo "Migrations completed successfully"

            # Verify the users table exists
            echo "=== Verifying users table ==="
            docker compose -f docker-compose.prod.yml exec -T db psql -U "${DB_USER:-herwell}" -d "${DB_NAME:-herwell_db}" -c \
              "SELECT EXISTS (SELECT FROM information_schema.tables WHERE table_name='users');" 2>&1 | grep -q 't'
            if [ "$?" -ne 0 ]; then
              echo "ERROR: users table still missing after migration!"
              docker compose -f docker-compose.prod.yml logs --tail=30 backend
              exit 1
            fi
            echo "Users table verified ✓"

      # ── Smoke test: health check ─────────────────────────────────
      - name: Smoke test - health check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://$EC2_HOST/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check returned 200 after $((i * 5)) seconds"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 60 seconds"
          exit 1

      # ── Smoke test: registration ─────────────────────────────────
      - name: Smoke test - user registration
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "Testing user registration..."
          TEST_EMAIL="cd-test-$(date +%s)@herwell-test.local"
          RESPONSE=$(curl -s -w '\n%{http_code}' -X POST http://$EC2_HOST/api/auth/register \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"$TEST_EMAIL\",\"password\":\"TestPass123\",\"first_name\":\"CDTest\",\"date_of_birth\":\"2000-01-01\"}" 2>/dev/null || echo "")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Registration returned HTTP $HTTP_CODE"
          echo "Response: $(echo $BODY | head -c 500)"
          if [ "$HTTP_CODE" = "201" ]; then
            echo "✓ Registration successful"
            # Extract token for potential cleanup (not needed, test user will just sit in DB)
            echo "Cleanup: no action needed (test user is harmless)"
            exit 0
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "✓ User already exists (from previous test run) - registration system works"
            exit 0
          else
            echo "✗ Registration failed with HTTP $HTTP_CODE"
            exit 1
          fi

      # ── Diagnostics: show backend logs after every deploy ────────
      - name: Backend diagnostics
        if: always()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== Backend container status ==="
            docker inspect --format='{{.State.Health.Status}}' herwell-backend-1 2>/dev/null || echo "not found"
            echo ""
            echo "=== Recent backend logs (last 40 lines) ==="
            docker compose -f ~/herwell/docker-compose.prod.yml logs --tail=40 backend 2>/dev/null || echo "No logs available"
            echo ""
            echo "=== Env vars (names only) ==="
            docker exec herwell-backend-1 node -e "Object.keys(process.env).filter(k => !k.startsWith('npm_') && !k.startsWith('NODE_') && k !== 'HOME' && k !== 'PATH' && k !== 'PWD' && k !== 'SHLVL' && k !== '_').sort().forEach(k => console.log(k + '=' + (k.includes('PASSWORD') || k.includes('SECRET') || k.includes('KEY') ? '***' : process.env[k]))) 2>/dev/null" 2>/dev/null || echo "Cannot inspect env"
