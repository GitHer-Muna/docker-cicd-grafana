# HerWell - Continuous Integration
# Runs on PRs: backend tests, frontend build, Docker build check

name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20

jobs:

  # ── Backend: lint & test ──────────────────────────────────────────
  backend-test:
    name: Backend lint & test
    runs-on: ubuntu-latest

    services:
      # Ephemeral PostgreSQL for integration tests
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: herwell
          POSTGRES_PASSWORD: herwell_test
          POSTGRES_DB: herwell_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U herwell
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run lint (if available)
        working-directory: ./backend
        run: npm run lint 2>/dev/null || echo "No lint script found — skipping"
        continue-on-error: true

      - name: Run tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: herwell
          DB_PASSWORD: herwell_test
          DB_NAME: herwell_test
          JWT_SECRET: ci_test_secret
          NODE_ENV: test
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/tests/**/test-results.*

  # ── Frontend: build check ─────────────────────────────────────────
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        env:
          VITE_API_URL: http://localhost:3000/api
        run: npm run build

      - name: Verify dist/ exists
        run: test -d frontend/dist && echo "✓ dist/ exists"

  # ── Docker build smoke test ───────────────────────────────────────
  docker-build-check:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t herwell-backend:ci ./backend

      - name: Build frontend image
        run: docker build --build-arg VITE_API_URL=http://localhost:3000/api -t herwell-frontend:ci ./frontend

      - name: Smoke test backend image
        run: docker run --rm herwell-backend:ci node -e "console.log('✓ Backend image runs successfully')"
