# HerWell - Production Docker Stack
# 7 services: db, backend, frontend, nginx, prometheus, grafana, node-exporter
# Usage: docker compose -f docker-compose.prod.yml up -d

services:

  db:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - herwell_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-herwell} -d ${POSTGRES_DB:-herwell_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - herwell_net

  backend:
    build:
      context: ./backend
    image: ${ECR_REGISTRY}/${ECR_BACKEND_REPO}:latest
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - herwell_net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    image: ${ECR_REGISTRY}/${ECR_FRONTEND_REPO}:latest
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - herwell_net

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - herwell_net

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - herwell_net

  grafana:
    image: grafana/grafana:11.1.0
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - herwell_net

  node-exporter:
    image: prom/node-exporter:v1.8.1
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - herwell_net

networks:
  herwell_net:
    driver: bridge

volumes:
  herwell_pgdata:
    driver: local
  grafana_data:
    driver: local
