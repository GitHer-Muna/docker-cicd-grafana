# SPA-aware Nginx config for the HerWell frontend
# Serves the built React app and handles client-side routing
server {
    listen       80;
    server_name  localhost;

    # Gzip compression for faster asset delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Serve the SPA
    location / {
        root   /usr/share/nginx/html;
        index  index.html;

        # Cache static assets with a versioned hash in the filename (Vite handles this)
        location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|ico|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Never cache index.html so the user always gets the latest build
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Client-side routing fallback: serve index.html for non-file paths
        try_files $uri $uri/ /index.html;
    }
}
