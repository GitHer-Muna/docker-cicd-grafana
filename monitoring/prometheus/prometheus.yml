# HerWell — Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'herwell-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:3001']
        labels:
          app: herwell
          tier: backend

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          app: herwell
          tier: infrastructure

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          app: herwell
          tier: monitoring
