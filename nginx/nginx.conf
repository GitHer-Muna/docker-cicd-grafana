# ─────────────────────────────────────────────────────────────────────
# HerWell — Nginx reverse proxy configuration
#
# This runs as the single entry point for all external traffic on port 80.
# - /api/* routes are proxied to the backend Express server
# - All other routes go to the frontend (React SPA)
# ─────────────────────────────────────────────────────────────────────

# Rate‑limiting zone for auth endpoints (10 requests per minute per IP)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    # Reasonable max body size for form uploads and journal entries
    client_max_body_size 5m;

    # ── Reverse proxy headers ────────────────────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── API proxy ────────────────────────────────────────────────────
    # Express routes are mounted at /api/* (e.g. /api/auth/login, /api/cycles).
    # We proxy_pass without stripping the /api prefix so Express receives
    # the full path it expects.
    # NOTE: proxy_pass below has NO trailing slash, so the full URI including
    # the /api prefix is preserved. Express routes are mounted at /api/*.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }

    # ── Metrics endpoint (internal only) ─────────────────────────────
    # Prometheus scrapes the backend container directly via the Docker
    # internal network (backend:3001/metrics), not through this proxy.
    # These rules add defence‑in‐depth: block external requests at the
    # proxy layer while allowing internal Docker subnet traffic.
    location = /metrics {
        allow 172.16.0.0/12;  # Docker default bridge & overlay networks
        deny all;
        proxy_pass http://backend:3001;
    }

    # ── Health check (exposed so load balancers can reach it) ────────
    location /health {
        proxy_pass http://backend:3001;
    }

    # ── Auth endpoint rate limiting ──────────────────────────────────
    # Brute‑force protection at the proxy layer, before requests reach
    # the application. 10 requests/minute/IP is deliberately low for a
    # small personal app; adjust upward if needed.
    location /api/auth/login {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend:3001;
    }

    location /api/auth/register {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend:3001;
    }

    # ── Frontend SPA ─────────────────────────────────────────────────
    # Everything else is served by the React app. Client‑side routing
    # is handled by the frontend Nginx config (try_files fallback).
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection '';
    }
}
